{% extends "base.html" %}

{% block title %}Admin Login - Calvary Gospel Prayer Fellowship{% endblock %}

{% block content %}
<section class="form-section">
    <div class="container">
        <div class="glass-card form-card" style="border-color: rgba(212, 175, 55, 0.4);">
            <h2 class="form-title" style="color: var(--border-gold);"><i class="fas fa-user-shield"></i> Admin Portal</h2>
            <p class="form-subtitle">Enter administrator credentials to manage website settings, churches, and content moderation.</p>
            
            <form action="/admin/login" method="POST">
                <div class="form-group">
                    <label class="form-label" for="username">Admin Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Admin username" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Security Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Admin password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; background: linear-gradient(135deg, #d4af37 0%, #8c7320 100%);">Authenticate</button>
            </form>
            
            <div class="form-footer">
                <a href="/" style="color: var(--text-muted);"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
